<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiring Dashboard — HrFlow.ai App Store Example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #1a1a2e; color: white; padding: 1.5rem 2rem; }
    header h1 { font-size: 1.5rem; font-weight: 600; }
    header p { color: #a0a0b0; margin-top: 0.25rem; font-size: 0.9rem; }
    .config { background: white; border-bottom: 1px solid #e0e0e0; padding: 1rem 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: end; }
    .config label { font-size: 0.8rem; font-weight: 500; color: #666; display: flex; flex-direction: column; gap: 0.25rem; }
    .config input { padding: 0.4rem 0.6rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.85rem; width: 280px; }
    .config button { padding: 0.4rem 1.2rem; background: #4361ee; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .config button:hover { background: #3a56d4; }
    main { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .section h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #1a1a2e; }
    .card { background: white; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; border: 1px solid #e8e8e8; }
    .card h3 { font-size: 0.95rem; margin-bottom: 0.25rem; }
    .card p { font-size: 0.85rem; color: #666; }
    .tag { display: inline-block; background: #eef; color: #4361ee; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem; margin-right: 0.25rem; }
    .placeholder { color: #999; font-style: italic; padding: 2rem; text-align: center; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Hiring Dashboard</h1>
    <p>Example app — HrFlow.ai App Store</p>
  </header>

  <div class="config">
    <label>
      API Key
      <input type="password" id="apiKey" placeholder="Enter your HrFlow.ai API key">
    </label>
    <label>
      Source Key
      <input type="text" id="sourceKey" placeholder="Enter source key">
    </label>
    <label>
      Board Key
      <input type="text" id="boardKey" placeholder="Enter board key">
    </label>
    <button onclick="fetchData()">Load Data</button>
  </div>

  <main>
    <div class="grid">
      <div class="section">
        <h2>Job Listings</h2>
        <div id="jobs">
          <div class="placeholder">Enter your credentials above and click "Load Data" to fetch jobs.</div>
        </div>
      </div>
      <div class="section">
        <h2>Candidate Profiles</h2>
        <div id="profiles">
          <div class="placeholder">Enter your credentials above and click "Load Data" to fetch profiles.</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = "https://api.hrflow.ai";

    async function fetchData() {
      const apiKey = document.getElementById("apiKey").value.trim();
      const sourceKey = document.getElementById("sourceKey").value.trim();
      const boardKey = document.getElementById("boardKey").value.trim();

      if (!apiKey) { alert("Please enter your API key."); return; }

      const headers = { "X-API-KEY": apiKey, "Content-Type": "application/json" };

      if (boardKey) {
        fetchJobs(headers, boardKey);
      }
      if (sourceKey) {
        fetchProfiles(headers, sourceKey);
      }
    }

    async function fetchJobs(headers, boardKey) {
      const container = document.getElementById("jobs");
      container.innerHTML = '<div class="placeholder">Loading jobs...</div>';

      try {
        const params = new URLSearchParams({ board_keys: JSON.stringify([boardKey]), limit: "10" });
        const res = await fetch(`${API_BASE}/v1/jobs/searching?${params}`, { headers });
        const data = await res.json();

        if (data.data && data.data.jobs && data.data.jobs.length > 0) {
          container.innerHTML = data.data.jobs.map(job => `
            <div class="card">
              <h3>${escapeHtml(job.name || "Untitled Job")}</h3>
              <p>${escapeHtml(job.location?.text || "No location")}</p>
              ${(job.tags || []).slice(0, 3).map(t => `<span class="tag">${escapeHtml(t.name)}</span>`).join("")}
            </div>
          `).join("");
        } else {
          container.innerHTML = '<div class="placeholder">No jobs found for this board.</div>';
        }
      } catch (err) {
        container.innerHTML = `<div class="placeholder">Error: ${escapeHtml(err.message)}</div>`;
      }
    }

    async function fetchProfiles(headers, sourceKey) {
      const container = document.getElementById("profiles");
      container.innerHTML = '<div class="placeholder">Loading profiles...</div>';

      try {
        const params = new URLSearchParams({ source_keys: JSON.stringify([sourceKey]), limit: "10" });
        const res = await fetch(`${API_BASE}/v1/profiles/searching?${params}`, { headers });
        const data = await res.json();

        if (data.data && data.data.profiles && data.data.profiles.length > 0) {
          container.innerHTML = data.data.profiles.map(profile => `
            <div class="card">
              <h3>${escapeHtml(profile.info?.full_name || "Anonymous")}</h3>
              <p>${escapeHtml(profile.info?.location?.text || "No location")}</p>
              <p>${escapeHtml(profile.text?.substring(0, 120) || "")}${(profile.text?.length || 0) > 120 ? "..." : ""}</p>
            </div>
          `).join("");
        } else {
          container.innerHTML = '<div class="placeholder">No profiles found for this source.</div>';
        }
      } catch (err) {
        container.innerHTML = `<div class="placeholder">Error: ${escapeHtml(err.message)}</div>`;
      }
    }

    function escapeHtml(str) {
      if (!str) return "";
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
